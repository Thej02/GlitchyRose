<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GlitchyRose | Save the Digital Rose</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="Design.css">
</head>

<body>

    <div class="container">

        <!-- Header -->

        <header>

            <h1> GlitchyRose</h1>

            <p class="tagline">
                Save the Digital Rose before it is corrupted.
            </p>

        </header>


        <!-- Game Stats -->

        <section class="stats">

            <div class="stat-card">

                <span class="title">Category</span>

                <h3 id="category">Programming</h3>

            </div>

            <div class="stat-card">

                <span class="title">Lives</span>

                <h3 id="lives">❤️❤️❤️❤️❤️❤️❤️</h3>

            </div>

            <div class="stat-card">

                <span class="title">Score</span>

                <h3 id="score">0</h3>

            </div>

            <div class="stat-card">

                <span class="title">Streak</span>

                <h3 id="streak">0</h3>

            </div>

        </section>



        <!-- Rose SVG -->

        <section class="rose-area">

            <svg id="rose-svg" width="250" height="250">

                <!-- Stand -->

                <line x1="40" y1="220" x2="200" y2="220"/>

                <line x1="60" y1="220" x2="60" y2="30"/>

                <line x1="60" y1="30" x2="150" y2="30"/>

                <!-- Rope -->

                <line id="rope"
                    class="hidden"
                    x1="150"
                    y1="30"
                    x2="150"
                    y2="60"/>

                <!-- Head -->

                <circle id="head"
                    class="hidden"
                    cx="150"
                    cy="75"
                    r="15"/>

                <!-- Body -->

                <line id="body"
                    class="hidden"
                    x1="150"
                    y1="90"
                    x2="150"
                    y2="145"/>

                <!-- Arms -->

                <line id="left-arm"
                    class="hidden"
                    x1="150"
                    y1="105"
                    x2="125"
                    y2="90"/>

                <line id="right-arm"
                    class="hidden"
                    x1="150"
                    y1="105"
                    x2="175"
                    y2="90"/>

                <!-- Legs -->

                <line id="left-leg"
                    class="hidden"
                    x1="150"
                    y1="145"
                    x2="130"
                    y2="180"/>

                <line id="right-leg"
                    class="hidden"
                    x1="150"
                    y1="145"
                    x2="170"
                    y2="180"/>

            </svg>

        </section>



        <!-- Word -->

        <section>

            <div
                class="word-display"
                id="word-display">

            </div>

        </section>



        <!-- Used Letters -->

        <section>

            <h3>Guessed Letters</h3>

            <div
                class="guessed-letters"
                id="guessed-letters">

            </div>

        </section>



        <!-- Keyboard -->

        <section>

            <div
                class="keyboard"
                id="keyboard">

            </div>

        </section>



        <!-- Game Message -->

        <section>

            <p
                class="game-message"
                id="game-message">

            </p>

        </section>



        <!-- Buttons -->

        <section class="buttons">

            <button
                id="hint-button"
                class="hint-btn">

                💡 Hint

            </button>

            <button
                id="reset-button"
                class="reset-btn">

                 Grow Another Rose

            </button>

        </section>


    </div>

    <script src="Rose.js"></script>

</body>

</html>
